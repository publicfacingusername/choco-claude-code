name: Update Claude Code package

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update package files
        shell: pwsh
        id: changes
        run: |
          ./scripts/update.ps1

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add -A
          git commit -m "Update Claude Code package to ${{ steps.changes.outputs.version }}"
          git pull --rebase
          git push

      - name: Build package
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: |
          if (-not (Test-Path -Path "./claude-code.nuspec")) { throw "claude-code.nuspec not found to pack." }
          choco pack ./claude-code.nuspec

      - name: Push package
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          if (-not $env:CHOCOLATEY_API_KEY) { throw "CHOCOLATEY_API_KEY is not set." }
          if (-not (Test-Path -Path "./claude-code.nuspec")) { throw "claude-code.nuspec not found to read version." }
          [xml]$nuspecXml = Get-Content -Path "./claude-code.nuspec"
          $packageId = $nuspecXml.package.metadata.id
          $packageVersion = $nuspecXml.package.metadata.version
          if (-not $packageId -or -not $packageVersion) {
            throw "Package id/version missing from nuspec."
          }
          $pkg = Get-ChildItem -Filter "claude-code.*.nupkg" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $pkg) { throw "No nupkg found to push." }
          $pushOutput = choco push $pkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY 2>&1
          if ($LASTEXITCODE -ne 0) {
            if ($pushOutput -match 'already exists on the repository') {
              Write-Host "Package $packageId $packageVersion already exists. Skipping push."
              exit 0
            }
            throw "choco push failed: $pushOutput"
          }
